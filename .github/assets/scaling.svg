<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="sbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa"/>
      <stop offset="100%" style="stop-color:#f4f4f5"/>
    </linearGradient>
    <linearGradient id="sarea" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#50c878;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#50c878;stop-opacity:0.02"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6ee7a0"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#86efac"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7b68ee"/>
      <stop offset="100%" style="stop-color:#6352d4"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7b68ee"/>
      <stop offset="100%" style="stop-color:#5a45c9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="680" height="320" rx="12" fill="url(#sbg)" stroke="#e4e4e7" stroke-width="1"/>

  <!-- Title -->
  <text x="60" y="32" fill="#18181b" font-size="14" font-weight="700">Worker scaling (150 DPI, pages/sec)</text>
  <text x="60" y="48" fill="#a1a1aa" font-size="10">fastpdf2png multi-process scaling via fork()</text>

  <!-- Chart area: x=80..640, y=65..260 -->
  <!-- Scale: 0=260, 1600=65 → y = 260 - (val/1600)*195 -->

  <!-- Y grid lines -->
  <line x1="80" y1="260" x2="640" y2="260" stroke="#e4e4e7" stroke-width="1"/>
  <text x="70" y="264" text-anchor="end" fill="#a1a1aa" font-size="10">0</text>

  <line x1="80" y1="211" x2="640" y2="211" stroke="#f4f4f5" stroke-width="1"/>
  <text x="70" y="215" text-anchor="end" fill="#a1a1aa" font-size="10">400</text>

  <line x1="80" y1="163" x2="640" y2="163" stroke="#f4f4f5" stroke-width="1"/>
  <text x="70" y="167" text-anchor="end" fill="#a1a1aa" font-size="10">800</text>

  <line x1="80" y1="114" x2="640" y2="114" stroke="#f4f4f5" stroke-width="1"/>
  <text x="70" y="118" text-anchor="end" fill="#a1a1aa" font-size="10">1,200</text>

  <line x1="80" y1="65" x2="640" y2="65" stroke="#f4f4f5" stroke-width="1"/>
  <text x="70" y="69" text-anchor="end" fill="#a1a1aa" font-size="10">1,600</text>

  <!-- Bars: x centers at 200, 320, 440, 560; width=80 -->
  <!-- 323 → 260-(323/1600)*195 = 260-39.4 = 220.6, h=39.4 -->
  <rect x="160" y="221" width="80" height="39" rx="6" fill="url(#bar1)"/>
  <text x="200" y="215" text-anchor="middle" fill="#16a34a" font-size="12" font-weight="700">323</text>
  <text x="200" y="284" text-anchor="middle" fill="#71717a" font-size="11" font-weight="600">1</text>

  <!-- 582 → 260-(582/1600)*195 = 260-71.0 = 189.0, h=71 -->
  <rect x="280" y="189" width="80" height="71" rx="6" fill="url(#bar2)"/>
  <text x="320" y="183" text-anchor="middle" fill="#16a34a" font-size="12" font-weight="700">582</text>
  <text x="320" y="284" text-anchor="middle" fill="#71717a" font-size="11" font-weight="600">2</text>

  <!-- 985 → 260-(985/1600)*195 = 260-120.0 = 140.0, h=120 -->
  <rect x="400" y="140" width="80" height="120" rx="6" fill="url(#bar3)"/>
  <text x="440" y="134" text-anchor="middle" fill="#6352d4" font-size="12" font-weight="700">985</text>
  <text x="440" y="284" text-anchor="middle" fill="#71717a" font-size="11" font-weight="600">4</text>

  <!-- 1536 → 260-(1536/1600)*195 = 260-187.2 = 72.8, h=187 -->
  <rect x="520" y="73" width="80" height="187" rx="6" fill="url(#bar4)"/>
  <text x="560" y="67" text-anchor="middle" fill="#5a45c9" font-size="12" font-weight="700">1,536</text>
  <text x="560" y="284" text-anchor="middle" fill="#71717a" font-size="11" font-weight="600">8</text>

  <!-- X axis label -->
  <text x="360" y="306" text-anchor="middle" fill="#a1a1aa" font-size="10">workers</text>
</svg>
