name: Build & Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            wheel_plat: manylinux_2_17_x86_64
            npm_platform: linux
            npm_arch: x64
          - os: macos-15
            arch: arm64
            wheel_plat: macosx_15_0_arm64
            npm_platform: darwin
            npm_arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install build tools
        run: pip install build wheel

      - name: Build C++ binary
        run: bash scripts/build.sh

      # --- Python wheel ---

      - name: Bundle binary into Python package
        run: |
          mkdir -p fastpdf2png/bin
          cp build/fastpdf2png fastpdf2png/bin/
          chmod +x fastpdf2png/bin/fastpdf2png
          for lib in build/libpdfium.so build/libpdfium.dylib; do
            [ -f "$lib" ] && cp "$lib" fastpdf2png/bin/ || true
          done

      - name: Build Python wheel
        run: python -m build --wheel

      - name: Retag wheel with platform
        env:
          WHEEL_PLAT: ${{ matrix.wheel_plat }}
        run: |
          cd dist
          for whl in *.whl; do
            python -m wheel tags --platform-tag "$WHEEL_PLAT" --remove "$whl"
          done
          ls -lh *.whl

      - name: Python smoke test
        run: |
          pip install dist/*.whl
          python -c "import fastpdf2png; print('Python import OK')"

      - name: Upload Python wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*.whl

      # --- npm platform package ---

      - name: Build npm platform package
        env:
          NPM_PLATFORM: ${{ matrix.npm_platform }}
          NPM_ARCH: ${{ matrix.npm_arch }}
        run: |
          PKG_NAME="@fastpdf2png/${NPM_PLATFORM}-${NPM_ARCH}"
          PKG_DIR="npm-platform-pkg"
          mkdir -p "$PKG_DIR"

          cp build/fastpdf2png "$PKG_DIR/"
          chmod +x "$PKG_DIR/fastpdf2png"
          for lib in build/libpdfium.so build/libpdfium.dylib; do
            [ -f "$lib" ] && cp "$lib" "$PKG_DIR/" || true
          done

          cat > "$PKG_DIR/package.json" << PKGJSON
          {
            "name": "${PKG_NAME}",
            "version": "1.2.0",
            "description": "fastpdf2png binary for ${NPM_PLATFORM}-${NPM_ARCH}",
            "os": ["${NPM_PLATFORM}"],
            "cpu": ["${NPM_ARCH}"],
            "license": "MIT",
            "files": ["fastpdf2png", "libpdfium.*"]
          }
          PKGJSON

          cd "$PKG_DIR" && npm pack
          ls -lh *.tgz

      - name: Upload npm package
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.npm_platform }}-${{ matrix.npm_arch }}
          path: npm-platform-pkg/*.tgz

  test:
    needs: build
    strategy:
      matrix:
        os: [ubuntu-latest, macos-15]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Install Python package
        run: |
          pip install artifacts/*.whl 2>/dev/null || pip install artifacts/*$(uname -m)*.whl
          pip install Pillow

      - name: Download test PDF
        run: curl -sL -o /tmp/test.pdf "https://arxiv.org/pdf/2312.10997"

      - name: Python tests
        env:
          FASTPDF2PNG_TEST_PDF: /tmp/test.pdf
        run: python tests/test_converter.py

      - name: Install binary for Node.js test
        run: |
          mkdir -p build
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64)  PLAT="linux-x64" ;;
            Darwin-arm64)  PLAT="darwin-arm64" ;;
          esac
          tar xzf artifacts/*${PLAT}*.tgz -C build --strip-components=1
          chmod +x build/fastpdf2png

      - name: Node.js smoke test
        run: |
          cd npm
          node -e "
            const pdf = require('./index.js');
            const n = pdf.pageCount('/tmp/test.pdf');
            console.log('Node.js OK: ' + n + ' pages');
          "

  publish-pypi:
    needs: [build, test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write

    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheel-*
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  publish-npm:
    needs: [build, test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - name: Download npm packages
        uses: actions/download-artifact@v4
        with:
          path: npm-artifacts
          pattern: npm-*
          merge-multiple: true

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for tgz in npm-artifacts/*.tgz; do
            npm publish "$tgz" --access public || true
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm
          npm publish --access public
