name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            preset: ci-linux-x64
            wheel_plat: manylinux_2_17_x86_64
            npm_platform: linux
            npm_arch: x64
          - os: macos-15
            preset: ci-macos-arm64
            wheel_plat: macosx_15_0_arm64
            npm_platform: darwin
            npm_arch: arm64
          - os: windows-latest
            preset: ci-windows-x64
            wheel_plat: win_amd64
            npm_platform: win32
            npm_arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download PDFium (Unix)
        if: runner.os != 'Windows'
        run: bash scripts/get_pdfium.sh

      - name: Download PDFium (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: bash scripts/get_pdfium.sh

      - name: Configure & Build
        shell: bash
        run: |
          cmake --preset ${{ matrix.preset }}
          cmake --build build --config Release --parallel

      # --- Python wheel ---

      - name: Bundle binary into Python package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p fastpdf2png/bin
          cp build/fastpdf2png fastpdf2png/bin/
          chmod +x fastpdf2png/bin/fastpdf2png
          for lib in build/libpdfium.so build/libpdfium.dylib; do
            [ -f "$lib" ] && cp "$lib" fastpdf2png/bin/ || true
          done

      - name: Bundle binary into Python package (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          mkdir fastpdf2png\bin 2>nul
          copy build\Release\fastpdf2png.exe fastpdf2png\bin\ 2>nul || copy build\fastpdf2png.exe fastpdf2png\bin\
          if exist build\pdfium.dll copy build\pdfium.dll fastpdf2png\bin\
          if exist build\Release\pdfium.dll copy build\Release\pdfium.dll fastpdf2png\bin\

      - name: Build Python wheel
        run: |
          pip install build wheel
          python -m build --wheel

      - name: Retag wheel with platform
        shell: bash
        run: |
          cd dist
          for whl in *.whl; do
            python -m wheel tags --platform-tag "$WHEEL_PLAT" --remove "$whl"
          done
          ls -lh *.whl
        env:
          WHEEL_PLAT: ${{ matrix.wheel_plat }}

      - name: Upload Python wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: dist/*.whl

      # --- npm platform package ---

      - name: Build npm platform package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          PKG_DIR="npm-platform-pkg"
          mkdir -p "$PKG_DIR"

          cp build/fastpdf2png "$PKG_DIR/"
          chmod +x "$PKG_DIR/fastpdf2png"
          for lib in build/libpdfium.so build/libpdfium.dylib; do
            [ -f "$lib" ] && cp "$lib" "$PKG_DIR/" || true
          done

          cat > "$PKG_DIR/package.json" << PKGJSON
          {
            "name": "@fastpdf2png/${NPM_PLATFORM}-${NPM_ARCH}",
            "version": "1.3.1",
            "description": "fastpdf2png binary for ${NPM_PLATFORM}-${NPM_ARCH}",
            "os": ["${NPM_PLATFORM}"],
            "cpu": ["${NPM_ARCH}"],
            "license": "MIT",
            "files": ["fastpdf2png", "libpdfium.*"]
          }
          PKGJSON

          cd "$PKG_DIR" && npm pack
          ls -lh *.tgz
        env:
          NPM_PLATFORM: ${{ matrix.npm_platform }}
          NPM_ARCH: ${{ matrix.npm_arch }}

      - name: Build npm platform package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          PKG_DIR="npm-platform-pkg"
          mkdir -p "$PKG_DIR"

          cp build/Release/fastpdf2png.exe "$PKG_DIR/" 2>/dev/null || cp build/fastpdf2png.exe "$PKG_DIR/"
          [ -f build/pdfium.dll ] && cp build/pdfium.dll "$PKG_DIR/" || true
          [ -f build/Release/pdfium.dll ] && cp build/Release/pdfium.dll "$PKG_DIR/" || true

          cat > "$PKG_DIR/package.json" << PKGJSON
          {
            "name": "@fastpdf2png/${NPM_PLATFORM}-${NPM_ARCH}",
            "version": "1.3.1",
            "description": "fastpdf2png binary for ${NPM_PLATFORM}-${NPM_ARCH}",
            "os": ["${NPM_PLATFORM}"],
            "cpu": ["${NPM_ARCH}"],
            "license": "MIT",
            "files": ["fastpdf2png.exe", "pdfium.dll"]
          }
          PKGJSON

          cd "$PKG_DIR" && npm pack
        env:
          NPM_PLATFORM: ${{ matrix.npm_platform }}
          NPM_ARCH: ${{ matrix.npm_arch }}

      - name: Upload npm package
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.npm_platform }}-${{ matrix.npm_arch }}
          path: npm-platform-pkg/*.tgz

      # --- Upload raw binary ---

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}
          path: |
            build/fastpdf2png
            build/fastpdf2png.exe
            build/Release/fastpdf2png.exe

  test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: wheel-*
          merge-multiple: true

      - name: Install Python package (Unix)
        if: runner.os != 'Windows'
        run: |
          pip install artifacts/*.whl 2>/dev/null || pip install artifacts/*$(uname -m)*.whl
          pip install Pillow

      - name: Install Python package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          pip install artifacts/*win_amd64*.whl
          pip install Pillow

      - name: Download test PDF
        run: curl -sL -o test.pdf "https://arxiv.org/pdf/2312.10997"

      - name: Python tests
        run: python tests/test_converter.py
        env:
          FASTPDF2PNG_TEST_PDF: test.pdf

      - name: Download npm artifacts
        uses: actions/download-artifact@v4
        with:
          path: npm-artifacts
          pattern: npm-*
          merge-multiple: true

      - name: Install binary for Node.js test (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p build
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64)  PLAT="linux-x64" ;;
            Darwin-arm64)  PLAT="darwin-arm64" ;;
          esac
          tar xzf npm-artifacts/*${PLAT}*.tgz -C build --strip-components=1
          chmod +x build/fastpdf2png

      - name: Install binary for Node.js test (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p build
          tar xzf npm-artifacts/*win32-x64*.tgz -C build --strip-components=1

      - name: Node.js smoke test
        run: |
          cd npm
          node -e "
            const pdf = require('./index.js');
            const n = pdf.pageCount(process.cwd() + '/../test.pdf');
            console.log('Node.js OK: ' + n + ' pages');
          "
