name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python lint
        run: |
          pip install ruff
          ruff check bindings/python/ tests/python/ || true

  build-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            preset: ci-linux-x64
            binary: build/fastpdf2png
          - os: macos-15
            preset: ci-macos-arm64
            binary: build/fastpdf2png
          - os: windows-latest
            preset: ci-windows-x64
            binary: build/Release/fastpdf2png.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download PDFium
        shell: bash
        run: bash scripts/get_pdfium.sh

      - name: Configure
        shell: bash
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        shell: bash
        run: cmake --build build --config Release --parallel

      - name: Download test PDFs
        shell: bash
        run: |
          curl -sL "https://arxiv.org/pdf/1706.03762" -o test_multipage.pdf
          curl -sL "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf" -o test_simple.pdf

      - name: Test — page count
        shell: bash
        run: |
          PAGES=$(${{ matrix.binary }} --info test_multipage.pdf)
          echo "Page count: $PAGES"
          [ "$PAGES" -gt 0 ] || exit 1

      - name: Test — single worker render
        shell: bash
        run: |
          mkdir -p out_1w
          ${{ matrix.binary }} test_multipage.pdf out_1w/page_%03d.png 150 1 -c 2
          COUNT=$(ls out_1w/*.png | wc -l | tr -d ' ')
          echo "Rendered $COUNT pages (1 worker)"
          [ "$COUNT" -gt 0 ] || exit 1

      - name: Test — multi worker render (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p out_4w
          ${{ matrix.binary }} test_multipage.pdf out_4w/page_%03d.png 150 4 -c 2
          COUNT=$(ls out_4w/*.png | wc -l | tr -d ' ')
          echo "Rendered $COUNT pages (4 workers)"
          [ "$COUNT" -gt 0 ] || exit 1

      - name: Test — multi worker correctness (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          # Single and multi-worker output must be byte-identical
          FAIL=0
          for f in out_1w/*.png; do
            base=$(basename "$f")
            if ! diff -q "$f" "out_4w/$base" > /dev/null 2>&1; then
              echo "MISMATCH: $base"
              FAIL=1
            fi
          done
          [ "$FAIL" -eq 0 ] && echo "All pages match between 1w and 4w" || exit 1

      - name: Test — PNG validity
        shell: bash
        run: |
          # Check first and last page have valid PNG magic bytes
          for f in out_1w/page_001.png out_1w/page_$(printf '%03d' $(ls out_1w/*.png | wc -l | tr -d ' ')).png; do
            MAGIC=$(xxd -l 4 "$f" | head -1 | awk '{print $2$3}')
            echo "$f: $MAGIC"
            [[ "$MAGIC" == "8950"* ]] || { echo "INVALID PNG: $f"; exit 1; }
          done
          echo "All PNGs valid"

      - name: Test — compression levels
        shell: bash
        run: |
          for c in 0 1 2; do
            mkdir -p "out_c${c}"
            ${{ matrix.binary }} test_simple.pdf "out_c${c}/page_%03d.png" 150 1 -c $c
            SIZE=$(wc -c < "out_c${c}/page_001.png" | tr -d ' ')
            echo "c=$c: $SIZE bytes"
            [ "$SIZE" -gt 100 ] || exit 1
          done

      - name: Test — daemon mode (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          RESULT=$(echo -e "INFO\ttest_multipage.pdf" | ${{ matrix.binary }} --daemon)
          echo "Daemon: $RESULT"
          echo "$RESULT" | grep -q "^OK" || exit 1

      - name: Test — Python binding
        shell: bash
        run: |
          export FASTPDF2PNG_BIN=$PWD/${{ matrix.binary }}
          python3 -c "
          import sys, os
          sys.path.insert(0, 'bindings/python')
          os.environ['FASTPDF2PNG_BIN'] = os.environ.get('FASTPDF2PNG_BIN', '')
          import fastpdf2png
          print('Version:', fastpdf2png.__version__)
          n = fastpdf2png.page_count('test_multipage.pdf')
          print('Pages:', n)
          assert n > 0, 'page_count failed'
          print('Python binding OK')
          "

      - name: Test — benchmark (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "=== Performance (8 workers, 150 DPI, c=2) ==="
          ${{ matrix.binary }} test_multipage.pdf /tmp/bench_%03d.png 150 8 -c 2
          rm -f /tmp/bench_*.png
